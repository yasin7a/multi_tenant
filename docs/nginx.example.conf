# Nginx example — platform domains only (legacy setup)
# Custom domain HTTPS requires manual certbot per domain: sudo certbot --nginx -d userdomain.com
# For auto SSL on custom domains, use Caddy (see docs/DEPLOYMENT.md).

server {
    listen 80;
    server_name multi.takitahmid.com *.multi.takitahmid.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name multi.takitahmid.com *.multi.takitahmid.com;

    ssl_certificate     /etc/letsencrypt/live/multi.takitahmid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multi.takitahmid.com/privkey.pem;

    client_max_body_size 6M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional: HTTP catch-all for custom domains (no HTTPS without extra certs)
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
